[agent]
  interval = "10s"
  flush_interval = "10s"

# Subscribe to sensor readings from all devices
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]

  # Topic structure: atmospheric/sensors/{device_id}
  # + is a single-level wildcard matching any device_id
  topics = ["atmospheric/sensors/+"]

  # Extract device_id from the topic path as a tag
  topic_tag = "topic"

  # Expected payload format (JSON):
  # { "temperature": 22.4, "humidity": 58.1, "pressure": 1013.2 }
  data_format = "json"
  json_time_key = ""
  json_string_fields = []

  # Rename the measurement
  name_override = "environment"

# Subscribe to anomaly predictions
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["atmospheric/anomalies/+"]
  topic_tag = "topic"
  data_format = "json"
  json_time_key = ""
  json_string_fields = []
  name_override = "anomalies"

# Rewrite the topic tag for anomalies to match raw sensors, ensuring a single device filter in Grafana matches both measurements.
[[processors.regex]]
  namepass = ["anomalies"]
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^atmospheric/anomalies/(.*)$"
    replacement = "atmospheric/sensors/${1}"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8181"]

  # InfluxDB 3 Core in default mode accepts any non-empty token
  token = "${INFLUX_TOKEN}"

  # organization is ignored by v3 Core but required by the plugin
  organization = ""

  # This becomes the database name in InfluxDB 3
  bucket = "atmospheric"
