<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="theme-color" content="#10221c" />
        <title>Atmospheric Setup</title>
        <style>
            /*__CSS__*/
        </style>
    </head>
    <body>
        <div class="grain"></div>
        <main>
            <header>
                <div>
                    <p class="eyebrow">Environmental node / setup console</p>
                    <h1>Atmospheric</h1>
                </div>
                <div class="status-card" aria-live="polite">
                    <span class="pulse" id="status-pulse"></span>
                    <div>
                        <strong id="status-title">Checking device</strong>
                        <small id="status-detail">Waiting for status</small>
                    </div>
                </div>
            </header>

            <section class="reading-strip" aria-label="Latest sensor reading">
                <div>
                    <span>Temperature</span><strong id="temperature">--</strong
                    ><small>°C</small>
                </div>
                <div>
                    <span>Humidity</span><strong id="humidity">--</strong
                    ><small>%</small>
                </div>
                <div>
                    <span>Pressure</span><strong id="pressure">--</strong
                    ><small>hPa</small>
                </div>
            </section>

            <form id="setup-form">
                <section class="panel wifi-panel">
                    <div class="panel-heading">
                        <div>
                            <span class="index">01</span>
                            <h2>Network</h2>
                        </div>
                        <button
                            class="text-button"
                            id="scan-button"
                            type="button"
                        >
                            Scan nearby
                        </button>
                    </div>
                    <label>
                        <span>WiFi network</span>
                        <input
                            id="wifi-ssid"
                            name="wifi-ssid"
                            maxlength="32"
                            required
                            autocomplete="off"
                            list="wifi-networks"
                        />
                        <datalist id="wifi-networks"></datalist>
                    </label>
                    <label>
                        <span>WiFi password</span>
                        <input
                            id="wifi-password"
                            name="wifi-password"
                            type="password"
                            maxlength="64"
                            autocomplete="new-password"
                        />
                        <small id="wifi-password-hint"
                            >Leave blank to keep the saved password.</small
                        >
                    </label>
                </section>

                <section class="panel mqtt-panel">
                    <div class="panel-heading">
                        <div>
                            <span class="index">02</span>
                            <h2>MQTT broker</h2>
                        </div>
                        <span class="protocol">MQTT / TCP</span>
                    </div>
                    <div class="host-row">
                        <label>
                            <span>Host</span>
                            <input
                                id="mqtt-host"
                                maxlength="253"
                                required
                                placeholder="192.168.1.10"
                            />
                        </label>
                        <label>
                            <span>Port</span>
                            <input
                                id="mqtt-port"
                                type="number"
                                min="1"
                                max="65535"
                                required
                                value="1883"
                            />
                        </label>
                    </div>
                    <label>
                        <span>Topic / channel</span>
                        <input
                            id="mqtt-topic"
                            maxlength="256"
                            required
                            placeholder="atmospheric/sensors/living-room"
                        />
                    </label>
                    <div class="credentials-row">
                        <label>
                            <span>Username <em>optional</em></span>
                            <input
                                id="mqtt-username"
                                maxlength="128"
                                autocomplete="username"
                            />
                        </label>
                        <label>
                            <span>Password <em>optional</em></span>
                            <input
                                id="mqtt-password"
                                type="password"
                                maxlength="256"
                                autocomplete="new-password"
                            />
                        </label>
                    </div>
                </section>

                <section class="panel cadence-panel">
                    <div class="panel-heading">
                        <div>
                            <span class="index">03</span>
                            <h2>Sampling</h2>
                        </div>
                    </div>
                    <label>
                        <span>Publish every</span>
                        <div class="unit-input">
                            <input
                                id="sampling-interval"
                                type="number"
                                min="5"
                                max="86400"
                                value="30"
                                required
                            />
                            <b>seconds</b>
                        </div>
                    </label>
                </section>

                <div class="action-row">
                    <p id="message" role="status">
                        Changes take effect after an automatic restart.
                    </p>
                    <button class="save-button" type="submit">
                        <span>Save configuration</span><b>→</b>
                    </button>
                </div>
            </form>
        </main>
        <script>
            /*__JS__*/
        </script>
    </body>
</html>
